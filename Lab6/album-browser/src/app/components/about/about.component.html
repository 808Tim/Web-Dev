<div class="about-container">
    <h2>About Project</h2>

    <div class="card">
        <div class="info-group">
            <span class="label">Student Name:</span>
            <span class="value">{{ studentName }}</span>
        </div>

        <div class="info-group">
            <span class="label">Course Name:</span>
            <span class="value">{{ courseName }}</span>
        </div>

        <div class="info-group desc-group">
            <span class="label">Description:</span>
            <p class="value">
                The project demonstrates modern Angular 17+ architecture, using components,
                services, routing, observables, and the new control flow syntax.
            </p>
        </div>
    </div>
</div>
